sonar.projectKey=NikoVonLas_jitsi-admin-panel
sonar.organization=nikovonlas

sonar.sources=api,frontend/src
sonar.exclusions=\
  **/node_modules/**,\
  frontend/build/**,\
  frontend/src/i18n/**,\
  frontend/src/main.tsx,\
  frontend/src/App.tsx,\
  frontend/src/theme/**,\
  frontend/src/test/**,\
  **/__tests__/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  api/database/**,\
  api/test/**,\
  api/index-adm.ts,\
  api/index-pri.ts,\
  api/index-pub.ts,\
  api/config.ts,\
  api/config.mailer.ts,\
  api/config.oidc.ts,\
  api/lib/adm/migration.ts,\
  api/lib/adm/housekeeping.ts,\
  api/lib/adm/cronjob.ts,\
  api/lib/common/mail.ts,\
  api/lib/pub/avatar.ts,\
  api/lib/pub/favicon.ts,\
  api/lib/pub/logo.ts,\
  api/lib/pub/ical.ts

sonar.coverage.exclusions=\
  **/test/**,\
  **/__tests__/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  api/database/**,\
  api/index-*.ts,\
  api/config*.ts,\
  api/lib/adm/migration.ts,\
  api/lib/adm/housekeeping.ts,\
  api/lib/adm/cronjob.ts,\
  api/lib/common/mail.ts,\
  api/lib/pub/avatar.ts,\
  api/lib/pub/favicon.ts,\
  api/lib/pub/logo.ts,\
  api/lib/pub/ical.ts,\
  frontend/src/App.tsx,\
  frontend/src/theme/**

sonar.typescript.tsconfigPath=frontend/tsconfig.json

# Coverage reports from vitest (frontend) and deno test (api)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,api/coverage/lcov.info

# Wait for quality gate result so CI fails when gate fails
sonar.qualitygate.wait=true
