# Development compose — builds all images locally from source.
# For production deployments use docker-compose.prod.yml instead.

services:
  db:
    image: postgres:17
    restart: always
    environment:
      - POSTGRES_DB=jitsi
      - POSTGRES_USER=jitsi
      - POSTGRES_PASSWORD=${DB_PASSWD}
    volumes:
      - ./api/database/02-create-jitsi-tables.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jitsi -d jitsi"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - intranet

  api-adm:
    image: ghcr.io/nikovonlas/jitsi-admin-panel/api-adm:latest
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - ALLOW_UNSECURE_CERT
      - API_SECRET
      - API_TIMEOUT
      - AUTH_LOCAL
      - CONTACT_EMAIL
      - DB_HOST=db
      - DB_PASSWD
      - APP_FQDN
      - LANG_UI
      - OIDC_CLIENT_ID
      - OIDC_CLIENT_SECRET
      - OIDC_ISSUER_URL
      - OIDC_SCOPES
      - SUPERADMIN_ROLE
    depends_on:
      db:
        condition: service_healthy
    networks:
      - intranet

  api-pri:
    image: ghcr.io/nikovonlas/jitsi-admin-panel/api-pri:latest
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - API_SECRET
      - DB_HOST=db
      - DB_PASSWD
      - APP_FQDN
      - MAILER_HOST
      - MAILER_PORT
      - MAILER_SECURE
      - MAILER_USER
      - MAILER_PASS
      - MAILER_FROM
    volumes:
      - uploads:/data
    depends_on:
      db:
        condition: service_healthy
      api-adm:
        condition: service_started
    networks:
      - intranet

  api-pub:
    image: ghcr.io/nikovonlas/jitsi-admin-panel/api-pub:latest
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - DB_HOST=db
      - DB_PASSWD
    volumes:
      - uploads:/data
    depends_on:
      db:
        condition: service_healthy
      api-adm:
        condition: service_started
    networks:
      - intranet

  ui:
    image: ghcr.io/nikovonlas/jitsi-admin-panel/ui:latest
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - APP_FQDN
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api-adm
      - api-pri
      - api-pub
    networks:
      - intranet

  watchtower:
    image: containrrr/watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
    command: --label-enable --cleanup --interval 300

volumes:
  data:
  uploads:
  caddy_data:
  caddy_config:

networks:
  intranet:
