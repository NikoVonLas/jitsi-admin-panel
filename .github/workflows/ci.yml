name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  lint-api:
    name: Deno lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Check formatting
        run: deno fmt --check api/
      - name: Lint
        run: deno lint api/

  build-frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend

  lint-i18n:
    name: i18n lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
        working-directory: frontend
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: i18n lint
        run: npm run i18n:lint
        working-directory: frontend

  test-api:
    name: API tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: jitsi_test
          POSTGRES_USER: jitsi
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Set up test database schema
        run: psql -U jitsi -h localhost -d jitsi_test -f api/database/02-create-jitsi-tables.sql
        env:
          PGPASSWORD: test
      - name: Run database migrations
        run: deno task migrate:test
        working-directory: api
      - name: Run tests with coverage
        run: deno task test:coverage
        working-directory: api
      - name: Fix lcov paths (make relative to repo root)
        run: sed -i "s|SF:$(pwd)/|SF:|g" api/coverage/lcov.info
      - name: Upload API coverage
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: api/coverage/lcov.info

  test-frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
        working-directory: frontend
      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: frontend
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info

  sonarcloud:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    if: always()
    needs: [lint-api, build-frontend, lint-i18n, test-api, test-frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download API coverage
        uses: actions/download-artifact@v4
        with:
          name: api-coverage
          path: api/coverage
        continue-on-error: true
      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
        continue-on-error: true
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
